<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whiteboard App</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body style="--scale: 0.2; --lineWidth: 10px">
<main class="lobby" id="lobby">
  <section class="lobby-panel">
    <div class="lobby-brand">
      <span class="board-mark"></span>
      <span>Whiteboard</span>
    </div>
    <h1>Start a shared board</h1>
    <p>Create a new room or paste a meeting code to join an existing board.</p>
    <input class="name-input" id="userName" type="text" placeholder="Your name" autocomplete="name">
    <input class="name-input" id="boardName" type="text" placeholder="Board name" autocomplete="off">
    <button class="primary-action" id="newWhiteboard" type="button">New whiteboard</button>
    <form class="join-form" id="joinWhiteboard">
      <input id="roomCode" type="text" placeholder="Meeting code" autocomplete="off">
      <button type="submit">Join</button>
    </form>
  </section>
</main>

<canvas id="whiteboard"></canvas>
<svg id="whiteboardSvg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
<div class="draw-handler"></div>
<div class="laser-layer" aria-hidden="true"></div>
<button class="minimap" type="button" aria-label="Minimap"><svg viewBox="0 0 240 160"></svg></button>
<input id="imageImport" type="file" accept="image/*" hidden>

<header class="workspace-bar">
  <div class="board-title">
    <span class="board-mark"></span>
    <span>Whiteboard</span>
  </div>
  <div class="collaboration">
    <div class="presence">
    </div>
    <button class="activity-toggle" type="button" aria-expanded="false" aria-controls="activityPanel">History</button>
    <button class="share-button" type="button">Share</button>
  </div>
</header>

<aside class="activity-panel" id="activityPanel" aria-label="Activity history">
  <div class="activity-header">
    <div>
      <strong>Activity</strong>
      <span>Room events</span>
    </div>
    <button class="activity-close" type="button" aria-label="Close history">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M6 6L18 18M18 6L6 18" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <ol class="activity-list"></ol>
</aside>

<aside class="snapshot-panel" id="snapshotPanel" aria-label="Snapshots">
  <div class="activity-header">
    <div>
      <strong>Snapshots</strong>
      <span>Saved board versions</span>
    </div>
    <button class="snapshot-close activity-close" type="button" aria-label="Close snapshots">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M6 6L18 18M18 6L6 18" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <ol class="snapshot-list"></ol>
</aside>

<aside class="properties-panel" id="propertiesPanel" aria-label="Object properties">
  <div class="properties-header">
    <div>
      <strong>Properties</strong>
      <span class="properties-summary">No selection</span>
    </div>
    <button class="properties-close activity-close" type="button" aria-label="Close properties">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M6 6L18 18M18 6L6 18" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="properties-content">
    <label>
      <span>Stroke</span>
      <input type="color" id="propertyStroke">
    </label>
    <label>
      <span>Fill</span>
      <input type="color" id="propertyFill">
    </label>
    <label>
      <span>Stroke size</span>
      <input type="number" id="propertyLineWidth" min="1" max="80" step="1">
    </label>
    <label>
      <span>Rotation</span>
      <input type="number" id="propertyRotation" min="-360" max="360" step="1">
    </label>
    <label>
      <span>Text</span>
      <textarea id="propertyText" rows="3"></textarea>
    </label>
    <label>
      <span>Font size</span>
      <input type="number" id="propertyFontSize" min="8" max="96" step="1">
    </label>
    <label>
      <span>Opacity</span>
      <input type="number" id="propertyOpacity" min="5" max="100" step="5">
    </label>
    <label>
      <span>Connector</span>
      <select id="propertyConnectorStyle">
        <option value="orthogonal">Orthogonal</option>
        <option value="straight">Straight</option>
      </select>
    </label>
    <label>
      <span>Arrowhead</span>
      <select id="propertyEndMarker">
        <option value="arrow">Arrow</option>
        <option value="none">None</option>
      </select>
    </label>
    <label class="property-checkbox">
      <input type="checkbox" id="propertyLocked">
      <span>Locked</span>
    </label>
  </div>
</aside>

<div class="toolbar bottom">
  <div class="move-handler"></div>
  <div class="toolbar-content">
    <div class="tool-group primary-tools">
      <button class="tool" id="select" title="Select" aria-label="Select"><svg viewBox="0 0 24 24" fill="none"><path d="M5 3L17 14L11 15.5L8.5 21L5 3Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
      <button class="tool" id="pan" title="Pan" aria-label="Pan"><svg viewBox="0 0 24 24" fill="none"><path d="M8 12V7.5C8 6.7 8.7 6 9.5 6S11 6.7 11 7.5V12" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M11 12V5.5C11 4.7 11.7 4 12.5 4S14 4.7 14 5.5V12" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M14 12V7.5C14 6.7 14.7 6 15.5 6S17 6.7 17 7.5V13" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M8 12L7.3 10.8C6.9 10.1 6 9.8 5.3 10.3C4.7 10.7 4.5 11.5 4.9 12.2L7.2 16.6C8.1 18.3 9.8 19.3 11.7 19.3H14.3C17.1 19.3 19 17.2 19 14.4V10C19 9.2 18.3 8.5 17.5 8.5S16 9.2 16 10" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="tool active" id="pen" title="Pen" aria-label="Pen"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19L15.5 8.5C16.3 7.7 17.6 7.7 18.3 8.5C19.1 9.3 19.1 10.6 18.3 11.3L7.8 21H5V19Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M14.5 9.5L17.5 12.5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
      <div class="line-width-preview" title="Stroke size" aria-label="Stroke size"><div class="preview"></div><div class="list"><div class="item" data-value="10"><div class="opt" style="--lineWidth: 10px"></div></div><div class="item active" data-value="15"><div class="opt" style="--lineWidth: 15px"></div></div><div class="item" data-value="20"><div class="opt" style="--lineWidth: 20px"></div></div><div class="item" data-value="25"><div class="opt" style="--lineWidth: 25px"></div></div><div class="item" data-value="35"><div class="opt" style="--lineWidth: 35px"></div></div></div></div>
      <div class="color"><input type="color" id="fillColor" title="Color" aria-label="Color"></div>
      <button id="undo" title="Undo" aria-label="Undo"><svg viewBox="0 0 24 24" fill="none"><path d="M9 8H5V4" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 8.5C7.2 6.4 9.8 5 12.7 5C17.3 5 21 8.7 21 13.3S17.3 21 12.7 21C9.5 21 6.7 19.2 5.4 16.5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
      <button id="redo" title="Redo" aria-label="Redo"><svg viewBox="0 0 24 24" fill="none"><path d="M15 8H19V4" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 8.5C16.8 6.4 14.2 5 11.3 5C6.7 5 3 8.7 3 13.3S6.7 21 11.3 21C14.5 21 17.3 19.2 18.6 16.5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>

    <div class="tool-menu">
      <button class="tool-menu-trigger" title="Drawing tools" aria-label="Drawing tools"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19L15.5 8.5C16.3 7.7 17.6 7.7 18.3 8.5C19.1 9.3 19.1 10.6 18.3 11.3L7.8 21H5V19Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M4 5C7 4 9.5 4.2 12 6" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-dasharray="1 3"/></svg></button>
      <div class="tool-popover"><div class="tool-group">
        <button class="tool" id="marker" title="Marker" aria-label="Marker"><svg viewBox="0 0 24 24" fill="none"><path d="M4 17L14.8 6.2C15.6 5.4 16.9 5.4 17.7 6.2L18.8 7.3C19.6 8.1 19.6 9.4 18.8 10.2L8 21H4V17Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M13.5 7.5L17.5 11.5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="tool" id="pencil" title="Pencil" aria-label="Pencil"><svg viewBox="0 0 24 24" fill="none"><path d="M6 18.5L15.8 8.7C16.5 8 17.6 8 18.3 8.7C19 9.4 19 10.5 18.3 11.2L8.5 21H6V18.5Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M5 5C7.8 4.1 10 4.3 12 5.6" stroke="var(--icon-color)" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="1 3"/></svg></button>
        <button class="tool" id="eraser" title="Eraser" aria-label="Eraser"><svg viewBox="0 0 24 24" fill="none"><path d="M5 15L13.5 6.5C14.3 5.7 15.7 5.7 16.5 6.5L18.5 8.5C19.3 9.3 19.3 10.7 18.5 11.5L11 19H6L5 15Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M12.5 7.5L17.5 12.5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="tool" id="object-eraser" title="Erase object" aria-label="Erase object"><svg viewBox="0 0 24 24" fill="none"><path d="M5 15L13.5 6.5C14.3 5.7 15.7 5.7 16.5 6.5L18.5 8.5C19.3 9.3 19.3 10.7 18.5 11.5L11 19H6L5 15Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M14 19H21" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="tool" id="fill" title="Fill" aria-label="Fill"><svg viewBox="0 0 24 24" fill="none"><path d="M7 11L12 6L18 12L13 17L7 11Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M18 17C18 17 20 19.2 20 20.5C20 21.3 19.3 22 18.5 22C17.7 22 17 21.3 17 20.5C17 19.2 18 17 18 17Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
      </div></div>
    </div>

    <div class="tool-menu">
      <button class="tool-menu-trigger" title="Shapes" aria-label="Shapes"><svg viewBox="0 0 24 24" fill="none"><path d="M5 6H13V14H5V6Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M16 5L21 10L16 15L11 10L16 5Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
      <div class="tool-popover"><div class="tool-group">
        <button class="tool" id="connector" title="Connector" aria-label="Connector"><svg viewBox="0 0 24 24" fill="none"><path d="M7 7H9C14 7 10 17 15 17H17" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><circle cx="5" cy="7" r="2" stroke="var(--icon-color)" stroke-width="2"/><circle cx="19" cy="17" r="2" stroke="var(--icon-color)" stroke-width="2"/></svg></button>
        <button class="tool" id="line" title="Line" aria-label="Line"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19L19 5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="tool" id="arrow" title="Arrow" aria-label="Arrow"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19L18 6" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M10 6H18V14" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="tool" id="rectangle" title="Rectangle" aria-label="Rectangle"><svg viewBox="0 0 24 24" fill="none"><path d="M5 6H19V18H5V6Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
        <button class="tool" id="ellipse" title="Ellipse" aria-label="Ellipse"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12C4 8.7 7.6 6 12 6S20 8.7 20 12S16.4 18 12 18S4 15.3 4 12Z" stroke="var(--icon-color)" stroke-width="2"/></svg></button>
        <button class="tool" id="diamond" title="Diamond" aria-label="Diamond"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4L20 12L12 20L4 12L12 4Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
        <button class="tool" id="polygon" title="Polygon" aria-label="Polygon"><svg viewBox="0 0 24 24" fill="none"><path d="M8 5H16L21 12L16 19H8L3 12L8 5Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
        <button class="tool" id="frame" title="Frame" aria-label="Frame"><svg viewBox="0 0 24 24" fill="none"><path d="M5 6H19V18H5V6Z" stroke="var(--icon-color)" stroke-width="2" stroke-dasharray="4 3" stroke-linejoin="round"/><path d="M8 3H14" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
      </div></div>
    </div>

    <div class="tool-menu">
      <button class="tool-menu-trigger" title="Text tools" aria-label="Text tools"><svg viewBox="0 0 24 24" fill="none"><path d="M6 5H18" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M12 5V19" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M9 19H15" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
      <div class="tool-popover"><div class="tool-group">
        <button class="tool text-tool" id="text" title="Text" aria-label="Text"><svg viewBox="0 0 24 24" fill="none"><path d="M6 5H18" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M12 5V19" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M9 19H15" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="tool" id="sticky" title="Sticky note" aria-label="Sticky note"><svg viewBox="0 0 24 24" fill="none"><path d="M6 4H18V15L13 20H6V4Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M13 20V15H18" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
        <button class="tool" id="callout" title="Callout" aria-label="Callout"><svg viewBox="0 0 24 24" fill="none"><path d="M5 5H19V15H13L9 20V15H5V5Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M8 9H16M8 12H13" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="tool" id="list" title="Bulleted list" aria-label="Bulleted list"><svg viewBox="0 0 24 24" fill="none"><path d="M10 7H19M10 12H19M10 17H19" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M6 7H6.01M6 12H6.01M6 17H6.01" stroke="var(--icon-color)" stroke-width="3" stroke-linecap="round"/></svg></button>
        <button class="tool" id="label" title="Label" aria-label="Label"><svg viewBox="0 0 24 24" fill="none"><path d="M5 8C5 6.9 5.9 6 7 6H14L20 12L14 18H7C5.9 18 5 17.1 5 16V8Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M8 12H13" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="tool" id="comment" title="Comment" aria-label="Comment"><svg viewBox="0 0 24 24" fill="none"><path d="M5 5H19V15H13L9 20V15H5V5Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M8 9H16M8 12H14" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
      </div></div>
    </div>

    <div class="tool-menu">
      <button class="tool-menu-trigger" title="Edit actions" aria-label="Edit actions"><svg viewBox="0 0 24 24" fill="none"><path d="M8 8H18V18H8V8Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M5 15H4V4H15V5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="tool-popover"><div class="tool-group">
        <button class="tool" id="lasso" title="Lasso select" aria-label="Lasso select"><svg viewBox="0 0 24 24" fill="none"><path d="M7 6C4.5 7.6 4 11.2 5.8 13.5C8.5 17.1 16.4 17.5 18.8 13.7C21.4 9.5 16.4 5.2 11.4 6.5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/><path d="M13 15L18 21" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button id="group" title="Group" aria-label="Group"><svg viewBox="0 0 24 24" fill="none"><path d="M4 8V4H8M16 4H20V8M20 16V20H16M8 20H4V16" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 8H16V16H8V8Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
        <button id="ungroup" title="Ungroup" aria-label="Ungroup"><svg viewBox="0 0 24 24" fill="none"><path d="M4 8V4H8M16 4H20V8M20 16V20H16M8 20H4V16" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 9H12V12H9V9ZM13 13H16V16H13V13Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
        <button id="lock" title="Lock" aria-label="Lock"><svg viewBox="0 0 24 24" fill="none"><path d="M7 10H17V20H7V10Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M9 10V7C9 5.3 10.3 4 12 4S15 5.3 15 7V10" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button id="unlock" title="Unlock" aria-label="Unlock"><svg viewBox="0 0 24 24" fill="none"><path d="M7 10H17V20H7V10Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M9 10V7C9 5.3 10.3 4 12 4C13.1 4 14 4.5 14.5 5.3" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button id="duplicate" title="Duplicate" aria-label="Duplicate"><svg viewBox="0 0 24 24" fill="none"><path d="M8 8H18V18H8V8Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M5 15H4V4H15V5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button id="bringForward" title="Bring forward" aria-label="Bring forward"><svg viewBox="0 0 24 24" fill="none"><path d="M8 8H18V18H8V8Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M12 14V10M12 10L10 12M12 10L14 12" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button id="sendBackward" title="Send backward" aria-label="Send backward"><svg viewBox="0 0 24 24" fill="none"><path d="M8 8H18V18H8V8Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M12 10V14M12 14L10 12M12 14L14 12" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button id="clear" title="Clear" aria-label="Clear"><svg viewBox="0 0 24 24" fill="none"><path d="M9 9L15 15M15 9L9 15" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="var(--icon-color)" stroke-width="2"/></svg></button>
        <button id="exportPng" title="Export PNG" aria-label="Export PNG"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4V14M12 14L8 10M12 14L16 10" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 17V20H19V17" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button id="exportSvg" title="Export SVG" aria-label="Export SVG"><svg viewBox="0 0 24 24" fill="none"><path d="M5 5H19V19H5V5Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M8 15C9 11 11 11 12 15C13 19 15 19 16 15" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button id="exportPdf" title="Export PDF" aria-label="Export PDF"><svg viewBox="0 0 24 24" fill="none"><path d="M7 3H15L19 7V21H7V3Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M15 3V8H19" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M10 14H16M10 17H14" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button id="copyImage" title="Copy as image" aria-label="Copy as image"><svg viewBox="0 0 24 24" fill="none"><path d="M8 8H18V18H8V8Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M11 15L13 13L15 15L17 12" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button id="importImage" title="Import image" aria-label="Import image"><svg viewBox="0 0 24 24" fill="none"><path d="M6 5H18V19H6V5Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M8 16L11 13L13 15L16 11L18 14" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="9" r="1.5" stroke="var(--icon-color)" stroke-width="2"/></svg></button>
        <button id="snapshot" title="Snapshot" aria-label="Snapshot"><svg viewBox="0 0 24 24" fill="none"><path d="M6 7H18V19H6V7Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M9 7L10 5H14L15 7" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="13" r="3" stroke="var(--icon-color)" stroke-width="2"/></svg></button>
        <button id="restoreSnapshot" title="Restore snapshot" aria-label="Restore snapshot"><svg viewBox="0 0 24 24" fill="none"><path d="M8 8H5V5" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 8.5C7 6.4 9.5 5 12.3 5C16.6 5 20 8.4 20 12.7S16.6 20 12.3 20C9.4 20 6.9 18.4 5.7 16" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/><path d="M12 9V13L15 15" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
      </div></div>
    </div>

    <div class="tool-menu">
      <button class="tool-menu-trigger" title="Collaboration tools" aria-label="Collaboration tools"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19L11 5L13 13L19 15L5 19Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/></svg></button>
      <div class="tool-popover"><div class="tool-group">
        <button class="tool" id="laser" title="Laser pointer" aria-label="Laser pointer"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19L11 5L13 13L19 15L5 19Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/><path d="M15 5L19 3M18 9H22M13 2V6" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/></svg></button>
      </div></div>
    </div>

  </div>
</div>
<div class="tool-tooltip" role="tooltip"></div>
<div class="status-toast" role="status" aria-live="polite"></div>

<div class="zoom-container">
  <button class="fit-board" type="button" title="Fit to screen" aria-label="Fit to screen">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M8 4H4V8M16 4H20V8M20 16V20H16M8 20H4V16" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9 9H15V15H9V9Z" stroke="var(--icon-color)" stroke-width="2" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="zoom-selection" type="button" title="Zoom to selection" aria-label="Zoom to selection">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M5 5H15V15H5V5Z" stroke="var(--icon-color)" stroke-width="2" stroke-dasharray="3 3"/>
      <path d="M14 14L20 20" stroke="var(--icon-color)" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="minus disabled">
    <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 12L18 12" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="value">20%</div>
  <div class="plus">
    <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g id="Edit / Add_Plus">
        <path id="Vector" d="M6 12H12M12 12H18M12 12V18M12 12V6" stroke="#fff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </svg>
  </div>
</div>
<div id="cursor"></div>
<div class="remote-cursors"></div>
<script src="./js/main.js" type="module"></script>
</body>
</html>
